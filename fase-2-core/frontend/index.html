<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS-OS</title>
    <style>
        :root {
            --bg:        #030803;
            --bg2:       #060d06;
            --bg3:       #091409;
            --primary:   #00ff88;
            --secondary: #39e566;
            --text:      #b0ffb0;
            --text-dim:  #3a6a3a;
            --border:    #1a3a1a;
            --glow:      rgba(0,255,136,0.25);
            --glow-s:    rgba(0,255,136,0.55);
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* scanlines */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.06) 2px,
                rgba(0,0,0,0.06) 4px
            );
            pointer-events: none;
            z-index: 999;
        }

        #matrix-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0.04;
        }

        /* ─── HEADER ─── */
        header {
            border-bottom: 1px solid var(--border);
            padding: 10px 24px;
            background: var(--bg2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 30px rgba(0,255,136,0.08);
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-hex {
            width: 36px;
            height: 36px;
            border: 2px solid var(--primary);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            color: var(--primary);
            text-shadow: 0 0 12px var(--primary);
            box-shadow: 0 0 14px var(--glow), inset 0 0 14px rgba(0,255,136,0.05);
            animation: hexglow 3s ease-in-out infinite;
        }

        @keyframes hexglow {
            0%,100% { box-shadow: 0 0 14px var(--glow), inset 0 0 14px rgba(0,255,136,0.05); }
            50%      { box-shadow: 0 0 28px var(--glow-s), inset 0 0 20px rgba(0,255,136,0.12); }
        }

        .logo-info h1 {
            font-size: 16px;
            letter-spacing: 6px;
            color: var(--primary);
            text-shadow: 0 0 12px var(--glow-s);
        }

        .logo-info small {
            font-size: 9px;
            letter-spacing: 3px;
            color: var(--text-dim);
        }

        .hud {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .hud-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 0 8px var(--primary);
            animation: blink 1.8s infinite;
        }

        .dot.offline { background:#ff4455; box-shadow:0 0 8px #ff4455; animation:none; }

        @keyframes blink {
            0%,100%{ opacity:1; }
            50%     { opacity:0.25; }
        }

        /* ─── CHAT ─── */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        #chat::-webkit-scrollbar      { width: 3px; }
        #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .msg {
            max-width: 72%;
            animation: fadeup 0.25s ease;
        }

        @keyframes fadeup {
            from { opacity:0; transform:translateY(10px); }
            to   { opacity:1; transform:translateY(0); }
        }

        .msg-jarvis { align-self: flex-start; }
        .msg-user   { align-self: flex-end; }

        .msg-label {
            font-size: 9px;
            letter-spacing: 3px;
            margin-bottom: 5px;
        }

        .msg-jarvis .msg-label { color: var(--primary); text-shadow: 0 0 8px var(--glow); }
        .msg-user   .msg-label { color: var(--secondary); text-align: right; }

        .msg-bubble {
            padding: 13px 18px;
            font-size: 13px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .msg-jarvis .msg-bubble {
            background: var(--bg3);
            border-left: 2px solid var(--primary);
            box-shadow: -3px 0 24px rgba(0,255,136,0.12);
        }

        .msg-user .msg-bubble {
            background: #050f08;
            border-right: 2px solid var(--secondary);
            box-shadow: 3px 0 24px rgba(57,229,102,0.12);
        }

        /* typing */
        .typing-wrap {
            display: flex;
            gap: 5px;
            padding: 14px 18px;
            align-items: center;
        }

        .typing-wrap span {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--primary);
            animation: tdot 1.1s infinite;
        }

        .typing-wrap span:nth-child(2){ animation-delay:.18s; }
        .typing-wrap span:nth-child(3){ animation-delay:.36s; }

        @keyframes tdot {
            0%,100%{ opacity:.2; transform:translateY(0); }
            50%     { opacity:1;  transform:translateY(-4px); }
        }

        /* ─── FOOTER ─── */
        footer {
            border-top: 1px solid var(--border);
            padding: 14px 24px;
            background: var(--bg2);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .prompt-sym {
            color: var(--primary);
            font-size: 15px;
            text-shadow: 0 0 10px var(--glow-s);
            user-select: none;
        }

        #input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-family: 'Courier New', monospace;
            font-size: 13px;
            caret-color: var(--primary);
        }

        #input::placeholder { color: var(--text-dim); }

        #send-btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            font-family: 'Courier New', monospace;
            font-size: 10px;
            letter-spacing: 3px;
            padding: 8px 18px;
            cursor: pointer;
            text-shadow: 0 0 8px var(--glow);
            box-shadow: 0 0 10px rgba(0,255,136,0.08);
            transition: all 0.15s;
        }

        #send-btn:hover:not(:disabled) {
            background: rgba(0,255,136,0.08);
            box-shadow: 0 0 22px var(--glow);
        }

        #send-btn:disabled { opacity:0.25; cursor:not-allowed; }

        /* ─── DIVIDER ─── */
        .divider {
            align-self: center;
            font-size: 9px;
            letter-spacing: 4px;
            color: var(--border);
            user-select: none;
        }
    </style>
</head>
<body>

<canvas id="matrix-bg"></canvas>

<header>
    <div class="logo">
        <div class="logo-hex">J</div>
        <div class="logo-info">
            <h1>JARVIS-OS</h1>
            <small>SISTEMA DE INTELIGENCIA PERSONAL</small>
        </div>
    </div>
    <div class="hud">
        <div class="hud-item">
            <div class="dot" id="status-dot"></div>
            <span id="status-text">CONECTANDO...</span>
        </div>
        <div class="hud-item" id="rag-hud" style="display:none">
            <span>⬡</span>
            <span id="rag-count">—</span>
        </div>
    </div>
</header>

<div id="chat">
    <!-- mensajes dinámicos -->
</div>

<footer>
    <span class="prompt-sym">&gt;_</span>
    <input id="input" type="text" placeholder="Escribe tu mensaje..." autocomplete="off" />
    <button id="send-btn" disabled>ENVIAR</button>
</footer>

<script>
const API      = 'http://localhost:8000';
const sesionId = 'ui-' + crypto.randomUUID().slice(0, 8);

const chat    = document.getElementById('chat');
const input   = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');

// ── Matrix rain ──────────────────────────────────────────
const canvas = document.getElementById('matrix-bg');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const CHARS = '01アイウエオJARVISシステム知識記憶';
const FS    = 13;
let drops   = [];

function resetDrops() {
    const cols = Math.floor(canvas.width / FS);
    drops = Array.from({length: cols}, () => Math.random() * -50);
}
resetDrops();
window.addEventListener('resize', resetDrops);

function drawMatrix() {
    ctx.fillStyle = 'rgba(3,8,3,0.07)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.font      = FS + 'px Courier New';

    drops.forEach((y, i) => {
        const bright = Math.random() > 0.95;
        ctx.fillStyle = bright ? '#aaffcc' : '#00ff88';
        const ch = CHARS[Math.floor(Math.random() * CHARS.length)];
        ctx.fillText(ch, i * FS, y * FS);
        if (y * FS > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i] += 0.5;
    });
}
setInterval(drawMatrix, 55);

// ── Helpers ───────────────────────────────────────────────
function esc(t) {
    return t
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/\n/g,'<br>');
}

function scrollBottom() {
    chat.scrollTop = chat.scrollHeight;
}

function addMsg(role, text) {
    const label  = role === 'jarvis' ? '⬡ JARVIS' : '── TÚ';
    const div    = document.createElement('div');
    div.className = `msg msg-${role}`;
    div.innerHTML = `
        <div class="msg-label">${label}</div>
        <div class="msg-bubble">${esc(text)}</div>
    `;
    chat.appendChild(div);
    scrollBottom();
    return div;
}

function addDivider(text) {
    const div = document.createElement('div');
    div.className   = 'divider';
    div.textContent = `─── ${text} ───`;
    chat.appendChild(div);
}

function addTyping() {
    const div    = document.createElement('div');
    div.className = 'msg msg-jarvis';
    div.innerHTML = `
        <div class="msg-label">⬡ JARVIS</div>
        <div class="msg-bubble">
            <div class="typing-wrap"><span></span><span></span><span></span></div>
        </div>
    `;
    chat.appendChild(div);
    scrollBottom();
    return div;
}

// ── Conexión inicial ──────────────────────────────────────
async function conectar() {
    try {
        const r = await fetch(API + '/salud');
        const d = await r.json();

        document.getElementById('status-text').textContent = 'EN LÍNEA';
        document.getElementById('status-dot').classList.remove('offline');

        const ragHud = document.getElementById('rag-hud');
        ragHud.style.display = 'flex';
        document.getElementById('rag-count').textContent =
            d.notas_indexadas + ' fragmentos';

        addDivider('SESIÓN ' + sesionId.toUpperCase());
        addMsg('jarvis',
            'Sistema iniciado.\n\n' +
            'Soy JARVIS — tu sistema de inteligencia personal. ' +
            'Tengo acceso a tu vault con ' + d.notas_indexadas + ' fragmentos indexados, ' +
            'memoria persistente y herramientas de búsqueda semántica.\n\n' +
            '¿En qué puedo ayudarte?'
        );

        sendBtn.disabled = false;
        input.focus();
    } catch {
        document.getElementById('status-text').textContent = 'SIN CONEXIÓN';
        document.getElementById('status-dot').classList.add('offline');
        addMsg('jarvis',
            '[ERROR] No puedo conectar con el servidor.\n\n' +
            'Asegúrate de que JARVIS esté corriendo:\n' +
            '  cd fase-2-core\n' +
            '  uv run uvicorn api.main:app --port 8000'
        );
    }
}

// ── Enviar mensaje ────────────────────────────────────────
async function enviar() {
    const texto = input.value.trim();
    if (!texto) return;

    input.value   = '';
    input.disabled = true;
    sendBtn.disabled = true;

    addMsg('user', texto);
    const typing = addTyping();

    try {
        const res = await fetch(API + '/chat', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ mensaje: texto, sesion_id: sesionId }),
        });

        typing.remove();

        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            addMsg('jarvis', '[ERROR ' + res.status + '] ' + (err.detail || 'Sin respuesta.'));
        } else {
            const data = await res.json();
            addMsg('jarvis', data.respuesta || '—');
        }
    } catch {
        typing.remove();
        addMsg('jarvis', '[ERROR] Perdí conexión con el servidor.');
    } finally {
        input.disabled   = false;
        sendBtn.disabled = false;
        input.focus();
    }
}

sendBtn.addEventListener('click', enviar);
input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); }
});

conectar();
</script>
</body>
</html>
