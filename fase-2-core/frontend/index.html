<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS-OS</title>
<style>
:root {
  --bg0: #010401; --bg1: #040c05; --bg2: #071209; --bg3: #0a1a0c;
  --p:   #00ff88; --p2:  #00cc6a;
  --cy:  #00e5ff; --am:  #ffbf47; --re:  #ff4455;
  --th:  #d0ffd0; --tm:  #78b878; --tl:  #2a542a; --td:  #163016;
  --br:  #0e1e0e; --br2: #1a341a;
  --gl:  rgba(0,255,136,.18); --gl2: rgba(0,255,136,.5);
  --gc:  rgba(0,229,255,.15);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg0);color:var(--th);
  font-family:'Courier New',monospace;font-size:13px;line-height:1;
}
/* scanlines */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9000;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);
}
/* grid */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    linear-gradient(rgba(0,255,136,.013) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,255,136,.013) 1px,transparent 1px);
  background-size:44px 44px;
}

/* canvas */
#bg{position:fixed;inset:0;z-index:-1;}

/* scan beam */
#scan{
  position:fixed;left:0;right:0;top:-140px;height:140px;
  background:linear-gradient(to bottom,transparent,rgba(0,255,136,.035) 50%,transparent);
  animation:scananim 14s linear infinite;pointer-events:none;z-index:8999;
}
@keyframes scananim{from{top:-140px;}to{top:100vh;}}

/* ── CORNER BRACKETS (CSS gradient technique) ── */
.bk{position:relative;}
.bk::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:2;
  background:
    linear-gradient(var(--p),var(--p)) top left/2px 18px no-repeat,
    linear-gradient(var(--p),var(--p)) top left/18px 2px no-repeat,
    linear-gradient(var(--p),var(--p)) top right/2px 18px no-repeat,
    linear-gradient(var(--p),var(--p)) top right/18px 2px no-repeat,
    linear-gradient(var(--p),var(--p)) bottom left/2px 18px no-repeat,
    linear-gradient(var(--p),var(--p)) bottom left/18px 2px no-repeat,
    linear-gradient(var(--p),var(--p)) bottom right/2px 18px no-repeat,
    linear-gradient(var(--p),var(--p)) bottom right/18px 2px no-repeat;
}
.bk-cy::before{
  background:
    linear-gradient(var(--cy),var(--cy)) top left/2px 18px no-repeat,
    linear-gradient(var(--cy),var(--cy)) top left/18px 2px no-repeat,
    linear-gradient(var(--cy),var(--cy)) top right/2px 18px no-repeat,
    linear-gradient(var(--cy),var(--cy)) top right/18px 2px no-repeat,
    linear-gradient(var(--cy),var(--cy)) bottom left/2px 18px no-repeat,
    linear-gradient(var(--cy),var(--cy)) bottom left/18px 2px no-repeat,
    linear-gradient(var(--cy),var(--cy)) bottom right/2px 18px no-repeat,
    linear-gradient(var(--cy),var(--cy)) bottom right/18px 2px no-repeat;
}

/* ── BOOT ── */
#boot{
  position:fixed;inset:0;z-index:5000;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg0);transition:opacity .7s ease;
}
#boot.out{opacity:0;pointer-events:none;}

.bt-wrap{width:min(660px,92vw);}

.bt-logo{
  font-size:28px;letter-spacing:10px;color:var(--p);
  text-shadow:0 0 30px var(--gl2),0 0 60px var(--gl);
  margin-bottom:4px;
}
.bt-sub{font-size:9px;letter-spacing:4px;color:var(--tl);margin-bottom:24px;}

.bt-term{
  background:var(--bg1);padding:22px 26px;margin-bottom:12px;
}
.bt-sep{font-size:10px;color:var(--td);margin-bottom:14px;letter-spacing:1px;}
#bt-log{min-height:168px;}

.bl{
  display:flex;justify-content:space-between;align-items:center;
  font-size:11px;line-height:2.3;
  opacity:0;transform:translateX(-8px);
  transition:opacity .22s ease,transform .28s ease;
}
.bl.in{opacity:1;transform:none;}
.bl-t{color:var(--tm);}
.bl-ok{color:var(--p);text-shadow:0 0 8px var(--gl);}
.bl-warn{color:var(--am);}
.bl-err{color:var(--re);}
.bl-hd{color:var(--p);letter-spacing:2px;justify-content:center;font-size:10px;}

.bt-bar-wrap{height:2px;background:var(--br2);overflow:hidden;margin-bottom:16px;}
.bt-bar-fill{height:100%;width:0;background:var(--p);box-shadow:0 0 10px var(--p);transition:width .07s linear;}

.bt-actions{display:flex;justify-content:space-between;align-items:center;}
.bt-hint{font-size:9px;letter-spacing:2px;color:var(--td);}
.bt-skip{
  background:none;border:1px solid var(--br2);color:var(--tl);
  font-family:inherit;font-size:9px;letter-spacing:2px;padding:6px 16px;
  cursor:pointer;transition:color .15s,border-color .15s;
}
.bt-skip:hover{color:var(--tm);border-color:var(--br2);}

/* ── APP ── */
#app{height:100vh;display:flex;flex-direction:column;opacity:0;transition:opacity .7s ease;position:relative;z-index:1;}
#app.in{opacity:1;}

/* ── HEADER ── */
header{
  flex-shrink:0;height:60px;
  padding:0 24px;
  border-bottom:1px solid var(--br2);
  background:rgba(4,12,5,.96);
  backdrop-filter:blur(14px);
  display:flex;align-items:center;justify-content:space-between;
  position:relative;
}
header::after{
  content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--p),var(--p2),transparent);
  opacity:.4;
}

.logo{display:flex;align-items:center;gap:16px;}

.logo-gem{
  width:40px;height:40px;border-radius:8px;
  border:1.5px solid var(--p2);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:bold;color:var(--p);
  text-shadow:0 0 14px var(--p);
  box-shadow:0 0 22px var(--gl),inset 0 0 22px rgba(0,255,136,.06);
  animation:gemgl 4s ease-in-out infinite;
  position:relative;overflow:hidden;
}
.logo-gem::before{
  content:'';position:absolute;top:-50%;left:-50%;
  width:40%;height:200%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);
  animation:shine 4s ease-in-out infinite;
}
@keyframes shine{0%,100%{transform:translateX(-100%) rotate(12deg);}40%,60%{transform:translateX(400%) rotate(12deg);}}
@keyframes gemgl{0%,100%{box-shadow:0 0 22px var(--gl),inset 0 0 22px rgba(0,255,136,.06);}50%{box-shadow:0 0 42px var(--gl2),inset 0 0 32px rgba(0,255,136,.12);}}

.logo-name{
  font-size:20px;letter-spacing:8px;color:var(--p);
  text-shadow:0 0 18px var(--gl2);position:relative;
}
.logo-name::before,.logo-name::after{content:attr(data-t);position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.logo-name::before{color:#ff0066;animation:ga 7s infinite steps(1);clip-path:polygon(0 20%,100% 20%,100% 44%,0 44%);transform:translateX(-2px);}
.logo-name::after{color:#00e5ff;animation:gb 7s infinite steps(1);clip-path:polygon(0 56%,100% 56%,100% 78%,0 78%);transform:translateX(2px);}
@keyframes ga{0%,87%,100%{opacity:0;}88%,91%{opacity:1;transform:translateX(-3px) skew(-1deg);}89%,90%{transform:translateX(5px) skew(1deg);}}
@keyframes gb{0%,89%,100%{opacity:0;}90%,93%{opacity:1;transform:translateX(2px);}91%,92%{transform:translateX(-4px);}}

.logo-sub{font-size:9px;letter-spacing:4px;color:var(--tl);margin-top:3px;}

.hud{display:flex;align-items:center;gap:6px;}
.hud-chip{
  display:flex;align-items:center;gap:7px;
  border:1px solid var(--br);padding:7px 14px;
  font-size:10px;letter-spacing:1.5px;color:var(--td);
  background:rgba(10,26,12,.5);transition:border-color .3s;
}
.hud-chip.live{border-color:var(--br2);}
.hud-chip .hv{color:var(--td);transition:color .3s;}
.hud-chip.live .hv{color:var(--p);text-shadow:0 0 7px var(--gl);}
.hud-chip.live .hv-cy{color:var(--cy);}
.dot{width:7px;height:7px;border-radius:50%;background:var(--td);transition:background .3s,box-shadow .3s;}
.dot.on{background:var(--p);box-shadow:0 0 8px var(--p);animation:blink 2s infinite;}
.dot.err{background:var(--re);box-shadow:0 0 8px var(--re);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
.hud-sep{width:1px;height:30px;background:var(--br);}

/* ── CHAT ── */
#chat-area{flex:1;overflow:hidden;}
#chat{
  height:100%;overflow-y:auto;
  padding:28px 32px;
  display:flex;flex-direction:column;gap:22px;
  scrollbar-width:thin;scrollbar-color:var(--br2) transparent;
}
#chat::-webkit-scrollbar{width:3px;}
#chat::-webkit-scrollbar-thumb{background:var(--br2);border-radius:2px;}

/* ── MESSAGES ── */
.msg{display:flex;flex-direction:column;max-width:75%;animation:msgin .32s cubic-bezier(.22,1,.36,1);}
@keyframes msgin{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.msg-j{align-self:flex-start;}
.msg-u{align-self:flex-end;}
.msg-sys{align-self:center;max-width:65%;}

.msg-hdr{display:flex;align-items:center;gap:9px;margin-bottom:8px;padding:0 2px;}
.msg-j .msg-hdr{flex-direction:row;}
.msg-u .msg-hdr{flex-direction:row-reverse;}

.msg-av{
  width:28px;height:28px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:bold;flex-shrink:0;
}
.msg-j .msg-av{background:rgba(0,255,136,.08);border:1px solid var(--p2);color:var(--p);text-shadow:0 0 8px var(--p);}
.msg-u .msg-av{background:rgba(0,229,255,.06);border:1px solid var(--cy);color:var(--cy);}

.msg-role{font-size:9px;letter-spacing:3px;}
.msg-j .msg-role{color:var(--p);text-shadow:0 0 6px var(--gl);}
.msg-u .msg-role{color:var(--cy);}
.msg-ts{font-size:9px;color:var(--tl);letter-spacing:1px;}

.msg-bbl{
  padding:16px 20px;position:relative;line-height:1.75;
}
.msg-j .msg-bbl{
  background:var(--bg2);
  border-left:2px solid var(--p);
  box-shadow:-4px 0 32px rgba(0,255,136,.07),inset 1px 0 0 rgba(0,255,136,.04);
}
.msg-j .msg-bbl::after{
  content:'';position:absolute;top:0;right:0;width:10px;height:2px;
  background:var(--p);opacity:.35;
}
.msg-u .msg-bbl{
  background:rgba(0,28,16,.85);
  border-right:2px solid var(--cy);
  box-shadow:4px 0 32px rgba(0,229,255,.06),inset -1px 0 0 rgba(0,229,255,.04);
}
.msg-u .msg-bbl::before{
  content:'';position:absolute;top:0;left:0;width:10px;height:2px;
  background:var(--cy);opacity:.35;
}
.msg-sys .msg-bbl{
  background:none;border:none;text-align:center;
  font-size:9px;letter-spacing:4px;color:var(--td);
  padding:4px 16px;
}
.msg-sys .msg-bbl::before{content:'—— ';}.msg-sys .msg-bbl::after{content:' ——';}

/* copy */
.cp-btn{
  position:absolute;top:8px;right:10px;
  background:none;border:1px solid var(--br);color:var(--tl);
  font-family:inherit;font-size:9px;letter-spacing:1px;
  padding:3px 8px;cursor:pointer;opacity:0;
  transition:opacity .15s,color .15s,border-color .15s;
}
.msg-bbl:hover .cp-btn{opacity:1;}
.cp-btn:hover,.cp-btn.ok{color:var(--p);border-color:var(--br2);}

/* markdown */
.msg-bbl strong{color:var(--p);}
.msg-bbl em{color:var(--cy);font-style:italic;}
.msg-bbl code{background:var(--bg1);border:1px solid var(--br2);padding:1px 5px;font-size:12px;color:#90ffb0;}
.msg-bbl pre{background:var(--bg1);border-left:2px solid var(--p2);padding:12px 16px;margin:10px 0;overflow-x:auto;font-size:12px;line-height:1.6;color:#a0ffb0;}
.msg-bbl pre code{background:none;border:none;padding:0;}
.msg-bbl ul,.msg-bbl ol{padding-left:20px;margin:6px 0;}
.msg-bbl li{margin:3px 0;}
.msg-bbl .md-h{color:var(--p);letter-spacing:1px;margin:8px 0 4px;border-bottom:1px solid var(--br);padding-bottom:4px;font-size:14px;}

/* typing */
.typing-bbl{
  padding:14px 20px;background:var(--bg2);
  border-left:2px solid var(--p);
  display:flex;align-items:center;gap:5px;
}
.typing-bbl span{width:5px;height:5px;border-radius:50%;background:var(--p);animation:td 1.1s infinite;}
.typing-bbl span:nth-child(2){animation-delay:.18s;}
.typing-bbl span:nth-child(3){animation-delay:.36s;}
@keyframes td{0%,100%{opacity:.2;transform:translateY(0);}50%{opacity:1;transform:translateY(-5px);}}

/* typewriter cursor */
.twc{display:inline-block;width:8px;height:13px;background:var(--p);vertical-align:middle;animation:tc .65s steps(1) infinite;margin-left:1px;}
@keyframes tc{0%,100%{opacity:1;}50%{opacity:0;}}

/* ── FOOTER ── */
footer{
  flex-shrink:0;
  border-top:1px solid var(--br2);
  background:rgba(4,12,5,.97);
  backdrop-filter:blur(14px);
}
footer::before{
  content:'';display:block;height:1px;
  background:linear-gradient(90deg,transparent,var(--p2),var(--p),var(--p2),transparent);
  opacity:.3;margin-bottom:-1px;
}
.cmd-line{
  display:flex;align-items:center;gap:12px;
  padding:13px 24px;border-bottom:1px solid var(--br);
}
.cmd-prompt{color:var(--p);font-size:16px;text-shadow:0 0 14px var(--gl2);user-select:none;flex-shrink:0;}
#input{
  flex:1;background:none;border:none;outline:none;
  color:var(--th);font-family:inherit;font-size:13px;caret-color:var(--p);letter-spacing:.3px;
}
#input::placeholder{color:var(--td);}
#input:disabled{color:var(--tl);}

#send-btn{
  flex-shrink:0;background:none;border:1px solid var(--p2);color:var(--p);
  font-family:inherit;font-size:10px;letter-spacing:3px;padding:9px 24px;
  cursor:pointer;text-shadow:0 0 8px var(--gl);
  box-shadow:0 0 14px rgba(0,255,136,.06),inset 0 0 14px rgba(0,255,136,.02);
  transition:all .15s;position:relative;overflow:hidden;
}
#send-btn::before{
  content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(0,255,136,.1),transparent);
  transition:left .4s;
}
#send-btn:hover:not(:disabled)::before{left:200%;}
#send-btn:hover:not(:disabled){background:rgba(0,255,136,.07);border-color:var(--p);box-shadow:0 0 28px var(--gl),inset 0 0 18px rgba(0,255,136,.04);}
#send-btn:disabled{opacity:.2;cursor:not-allowed;}

.sysbar{
  display:flex;align-items:center;
  padding:5px 24px;font-size:9px;letter-spacing:1.5px;color:var(--td);
  overflow:hidden;
}
.sb{display:flex;align-items:center;gap:5px;padding:0 14px;border-right:1px solid var(--br);white-space:nowrap;}
.sb:first-child{padding-left:0;}
.sb:last-child{border-right:none;}
.sb-v{color:var(--tl);}
.sb-v.hi{color:var(--p);text-shadow:0 0 5px var(--gl);}
#sb-st{transition:color .3s;}
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div id="scan"></div>

<!-- BOOT -->
<div id="boot">
  <div class="bt-wrap bk" style="padding:32px 36px;background:var(--bg1);">
    <div class="bt-logo">JARVIS-OS</div>
    <div class="bt-sub">SISTEMA DE INTELIGENCIA AUMENTADA  //  BUILD 0.3.0</div>
    <div class="bt-term bk" style="background:var(--bg0);">
      <div class="bt-sep">────────────────────────────────────────────────────────────────</div>
      <div id="bt-log"></div>
    </div>
    <div class="bt-bar-wrap"><div class="bt-bar-fill" id="bprog"></div></div>
    <div class="bt-actions">
      <div class="bt-hint">PRESIONA CUALQUIER TECLA PARA OMITIR</div>
      <button class="bt-skip" id="bt-skip">[ OMITIR ]</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="logo">
      <div class="logo-gem">J</div>
      <div>
        <div class="logo-name" data-t="JARVIS-OS">JARVIS-OS</div>
        <div class="logo-sub">SISTEMA DE INTELIGENCIA PERSONAL</div>
      </div>
    </div>
    <div class="hud">
      <div class="hud-chip" id="hc-st"><div class="dot" id="hdot"></div><span class="hv" id="hst">INICIALIZANDO</span></div>
      <div class="hud-sep"></div>
      <div class="hud-chip" id="hc-rag" style="visibility:hidden"><span style="color:var(--tl)">⬡</span><span class="hv" id="hrag">—</span></div>
      <div class="hud-sep"></div>
      <div class="hud-chip"><span style="color:var(--tl);font-size:9px;letter-spacing:1px">SES</span><span class="hv hv-cy" id="hses">—</span></div>
    </div>
  </header>

  <div id="chat-area"><div id="chat"></div></div>

  <footer>
    <div class="cmd-line">
      <span class="cmd-prompt">&gt;_</span>
      <input id="input" type="text" placeholder="Escribe tu consulta..." autocomplete="off" disabled/>
      <button id="send-btn" disabled>ENVIAR</button>
    </div>
    <div class="sysbar">
      <div class="sb"><span>SES</span><span class="sb-v" id="sb-ses">—</span></div>
      <div class="sb"><span>MOD</span><span class="sb-v">llama-3.3-70b</span></div>
      <div class="sb"><span>RAG</span><span class="sb-v" id="sb-rag">—</span></div>
      <div class="sb"><span>MEM</span><span class="sb-v">SQLite · local</span></div>
      <div class="sb"><span>EST</span><span class="sb-v hi" id="sb-st">ARRANQUE</span></div>
    </div>
  </footer>
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────
const API    = 'http://localhost:8000';
const SES_ID = 'ui-' + crypto.randomUUID().slice(0, 8);
const delay  = ms => new Promise(r => setTimeout(r, ms));
const ts     = () => new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
const esc    = t  => String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// ── Particle Network ───────────────────────────────────────────────────
const canvas = document.getElementById('bg');
const ctx    = canvas.getContext('2d');
let W, H, parts;

function initCanvas() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  parts = Array.from({length:60}, () => ({
    x: Math.random()*W, y: Math.random()*H,
    vx:(Math.random()-.5)*.4, vy:(Math.random()-.5)*.4,
    r: Math.random()*1.4+.4, p: Math.random()*Math.PI*2
  }));
}

function drawNet() {
  ctx.clearRect(0,0,W,H);
  for (let i=0;i<parts.length;i++) {
    for (let j=i+1;j<parts.length;j++) {
      const a=parts[i], b=parts[j];
      const d=Math.hypot(a.x-b.x,a.y-b.y);
      if (d<155) {
        ctx.strokeStyle=`rgba(0,255,136,${.055*(1-d/155)*(1+.3*Math.sin(a.p))})`;
        ctx.lineWidth=.5;
        ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
      }
    }
  }
  parts.forEach(p => {
    const g=.18+.12*Math.sin(p.p);
    ctx.fillStyle=`rgba(0,255,136,${g})`;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*(1+.2*Math.sin(p.p)),0,Math.PI*2); ctx.fill();
    p.x+=p.vx; p.y+=p.vy; p.p+=.016;
    if(p.x<-20)p.x=W+20; else if(p.x>W+20)p.x=-20;
    if(p.y<-20)p.y=H+20; else if(p.y>H+20)p.y=-20;
  });
}

window.addEventListener('resize', initCanvas);
initCanvas();
setInterval(drawNet, 48);

// ── Boot ────────────────────────────────────────────────────────────────
const BOOT = [
  {t:'» Verificando integridad del kernel...',         tag:'[OK]',   tc:'bl-ok',  d:420},
  {t:'» Inicializando módulos de razonamiento...',     tag:'[OK]',   tc:'bl-ok',  d:500},
  {t:'» Cargando configuración del sistema...',        tag:'[OK]',   tc:'bl-ok',  d:360},
  {t:'» Estableciendo conexión con API de Groq...',    tag:'[OK]',   tc:'bl-ok',  d:580},
  {t:'» Iniciando base de datos de memoria...',        tag:'[OK]',   tc:'bl-ok',  d:330},
  {t:'» Conectando con vault de conocimiento...',      tag:null,     tc:'bl-ok',  d:700},
  {t:'» Activando motor de búsqueda semántica...',     tag:null,     tc:'bl-ok',  d:480},
  {t:'────────────────────────────────────────────────────────────────', tag:null, tc:'bl-hd', d:220},
  {t:'Todos los sistemas operativos. Bienvenido.',     tag:null,     tc:'bl-hd',  d:350},
];

let bootDone = false, healthData = null;

async function runBoot() {
  const log  = document.getElementById('bt-log');
  const prog = document.getElementById('bprog');
  const hp   = fetch(API+'/salud').then(r=>r.json()).catch(()=>null);
  const els  = BOOT.map(()=>{const d=document.createElement('div');d.className='bl';log.appendChild(d);return d;});

  for (let i=0;i<BOOT.length;i++) {
    const b=BOOT[i];
    await delay(b.d);
    if (bootDone) return;
    const el=els[i];

    if (b.tc==='bl-hd') {
      el.innerHTML=`<span class="bl-hd">${esc(b.t)}</span>`;
    } else if (i===5) {
      healthData=await hp;
      const n=healthData?.notas_indexadas??'—';
      const tag=healthData?`[${n} FRAGMENTOS]`:'[ERROR]';
      const tc=healthData?'bl-ok':'bl-err';
      el.innerHTML=`<span class="bl-t">${esc(b.t)}</span><span class="${tc}">${tag}</span>`;
    } else if (i===6) {
      const tag=healthData?'[ACTIVO]':'[NO DISPONIBLE]';
      const tc=healthData?'bl-ok':'bl-warn';
      el.innerHTML=`<span class="bl-t">${esc(b.t)}</span><span class="${tc}">${tag}</span>`;
    } else {
      el.innerHTML=`<span class="bl-t">${esc(b.t)}</span><span class="${b.tc}">${b.tag||''}</span>`;
    }

    el.classList.add('in');
    prog.style.width=((i+1)/BOOT.length*100)+'%';
    await delay(25);
  }
  await delay(650);
  endBoot();
}

function endBoot() {
  if (bootDone) return;
  bootDone = true;

  document.getElementById('boot').classList.add('out');
  setTimeout(()=>document.getElementById('boot').remove(), 800);
  document.getElementById('app').classList.add('in');

  document.getElementById('hses').textContent  = SES_ID;
  document.getElementById('sb-ses').textContent = SES_ID;

  if (healthData) {
    const n = healthData.notas_indexadas;
    document.getElementById('hdot').classList.add('on');
    document.getElementById('hst').textContent   = 'EN LÍNEA';
    document.getElementById('hc-st').classList.add('live');
    document.getElementById('hrag').textContent  = n+' frags';
    document.getElementById('hc-rag').classList.add('live');
    document.getElementById('hc-rag').style.visibility = 'visible';
    document.getElementById('sb-rag').textContent = n+' fragmentos';
    document.getElementById('sb-st').textContent  = 'LISTO';
    inp.disabled = false;
    snd.disabled = false;
    addSys('SESIÓN '+SES_ID.toUpperCase()+' — SISTEMA OPERATIVO');
    addMsg('j','Sistema iniciado y operativo.\n\nTengo acceso a tu vault con **'+n+' fragmentos** indexados, memoria persistente y búsqueda semántica.\n\n¿En qué puedo ayudarte?', true);
  } else {
    document.getElementById('hdot').classList.add('err');
    document.getElementById('hst').textContent = 'SIN CONEXIÓN';
    document.getElementById('hc-st').classList.add('live');
    document.getElementById('sb-st').textContent = 'ERROR';
    document.getElementById('sb-st').style.color = 'var(--re)';
    addSys('ERROR — SERVIDOR NO DISPONIBLE');
    addMsg('j','[ERROR] No se pudo conectar con el servidor.\n\nEjecuta en una terminal:\n```\ncd fase-2-core\nuv run uvicorn api.main:app --port 8000\n```');
  }
  inp.focus();
}

document.getElementById('bt-skip').addEventListener('click', endBoot);
document.addEventListener('keydown', endBoot, {once:true});

// ── Chat ────────────────────────────────────────────────────────────────
const chat = document.getElementById('chat');
const inp  = document.getElementById('input');
const snd  = document.getElementById('send-btn');

function renderMd(raw) {
  let t = esc(raw);
  t = t.replace(/```[\w]*\n?([\s\S]*?)```/g, (_,c)=>`<pre><code>${c.trim()}</code></pre>`);
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  t = t.replace(/^#{1,3} (.+)$/gm, '<div class="md-h">$1</div>');
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
  t = t.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
  t = t.replace(/(<li>.*?<\/li>)/gs, s=>`<ul>${s}</ul>`);
  t = t.replace(/([^>])\n/g, '$1<br>');
  return t;
}

function scrollBot() { chat.scrollTop = chat.scrollHeight; }

function addSys(text) {
  const d=document.createElement('div');
  d.className='msg msg-sys';
  d.innerHTML=`<div class="msg-bbl">${esc(text)}</div>`;
  chat.appendChild(d); scrollBot();
}

function addMsg(role, text, tw=false) {
  const isJ  = role==='j';
  const label = isJ?'⬡ JARVIS':'TÚ';
  const glyph = isJ?'J':'U';
  const cid   = 'c'+Math.random().toString(36).slice(2,9);
  const d     = document.createElement('div');
  d.className = `msg msg-${role}`;
  d.innerHTML = `
    <div class="msg-hdr">
      <div class="msg-av">${glyph}</div>
      <span class="msg-role">${label}</span>
      <span class="msg-ts">${ts()}</span>
    </div>
    <div class="msg-bbl" id="${cid}">
      ${isJ?`<button class="cp-btn" onclick="doCopy('${cid}',this)">COPIAR</button>`:''}
      <span class="msg-cnt"></span>
    </div>
  `;
  chat.appendChild(d); scrollBot();
  const cnt = d.querySelector('.msg-cnt');
  if (isJ && tw && text.length<280) { typeWrite(cnt, text); }
  else { cnt.innerHTML = renderMd(text); scrollBot(); }
  return d;
}

function typeWrite(el, text, speed=16) {
  let i=0;
  const cur=document.createElement('span'); cur.className='twc'; el.appendChild(cur);
  const tick=()=>{
    if(i<text.length){ cur.before(document.createTextNode(text[i++])); scrollBot(); setTimeout(tick,speed); }
    else { cur.remove(); el.innerHTML=renderMd(text); scrollBot(); }
  };
  tick();
}

function addTyping() {
  const d=document.createElement('div');
  d.className='msg msg-j';
  d.innerHTML=`
    <div class="msg-hdr">
      <div class="msg-av">J</div>
      <span class="msg-role">⬡ JARVIS</span>
      <span class="msg-ts">${ts()}</span>
    </div>
    <div class="typing-bbl"><span></span><span></span><span></span></div>
  `;
  chat.appendChild(d); scrollBot();
  return d;
}

function doCopy(id, btn) {
  const el = document.getElementById(id);
  const txt = el.querySelector('.msg-cnt')?.innerText ?? el.innerText;
  navigator.clipboard.writeText(txt).then(()=>{
    btn.textContent='COPIADO'; btn.classList.add('ok');
    setTimeout(()=>{btn.textContent='COPIAR';btn.classList.remove('ok');},1500);
  });
}

// ── Send ──────────────────────────────────────────────────────────────────
async function enviar() {
  const txt = inp.value.trim();
  if (!txt) return;
  inp.value=''; inp.disabled=true; snd.disabled=true;
  snd.textContent='PROCESANDO...';
  document.getElementById('sb-st').textContent='PROCESANDO';
  document.getElementById('sb-st').style.color='var(--am)';

  addMsg('u', txt);
  const typing = addTyping();

  try {
    const res = await fetch(API+'/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({mensaje:txt, sesion_id:SES_ID}),
    });
    typing.remove();
    if (!res.ok) { const e=await res.json().catch(()=>({})); addMsg('j','[ERROR '+res.status+']\n'+(e.detail??'Sin respuesta.')); }
    else { const data=await res.json(); addMsg('j',data.respuesta??'—',true); }
  } catch {
    typing.remove();
    addMsg('j','[ERROR]\nSe perdió la conexión con el servidor.\nVerifica que JARVIS esté corriendo en puerto 8000.');
  } finally {
    inp.disabled=false; snd.disabled=false;
    snd.textContent='ENVIAR';
    document.getElementById('sb-st').textContent='LISTO';
    document.getElementById('sb-st').style.color='';
    inp.focus();
  }
}

snd.addEventListener('click', enviar);
inp.addEventListener('keydown', e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();enviar();} });

runBoot();
</script>
